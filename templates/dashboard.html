{% extends "base.html" %}

{% block content %}
    <div style="margin-bottom: 20px;">
        <div style="font-size: 50px;">👋</div>
        <h1 style="color: #333; margin: 10px 0;">Chào mừng, {{ username }}!</h1>
        <p style="color: #666;">Bạn đang đăng nhập với vai trò: 
            <b style="color: #4facfe; text-transform: uppercase;">{{ role }}</b>
        </p>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

    <div style="display: flex; flex-direction: column; gap: 10px;">
        {% if role == 'admin' %}
            <a href="/admin" class="btn btn-admin">Truy cập trang Quản trị</a>
        {% endif %}
        
        <a href="/logout" class="btn btn-logout">Đăng xuất hệ thống</a>
    </div>
{% endblock %}
